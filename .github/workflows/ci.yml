name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v7.0.0
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v7.0.0
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: v2.12.2

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v7.0.0
        with:
          go-version-file: go.mod
      - name: gofumpt
        run: |
          out=$(go tool gofumpt -l .)
          if [ -n "$out" ]; then
            echo "::error::these files need gofumpt (run 'just fmt'):"
            echo "$out"
            exit 1
          fi
      - name: goimports
        run: |
          out=$(go tool goimports -l .)
          if [ -n "$out" ]; then
            echo "::error::these files need goimports (run 'just fmt'):"
            echo "$out"
            exit 1
          fi
      - name: go mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
