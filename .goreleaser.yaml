version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: k3d-router
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^build:"
      - "^chore:"

release:
  draft: false

homebrew_casks:
  - repository:
      owner: foundry23
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/foundry23/k3d-router"
    description: "A shared local reverse proxy for k3d clusters"
